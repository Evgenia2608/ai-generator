<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <link rel="stylesheet" href="src/style.css">
  <title>AI Generator</title>
</head>
<body>
  <div class="container">
  <header>
  <h1>AI famous sayings generator</h1>
</header>

<main>
  <div class="form-container">
<form id="saying-generator-form">
<input type="text" placeholder="Enter the topic of the saying" autofocus required autocomplete="off" class="instructions" id="user-instructions"/>
<input type="submit" class="submit-button"/>
</form>
<div class="hint">i.e. life, love, smile, etc</div>
</div>
<div class="saying hidden" id="saying">
</div>

</main>

  </footer>
  </div>
<script src="src/index.js"></script>
</body>
</html>
